name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ========================================
  # Extract version from tag
  # ========================================
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # ========================================
  # Fetch dependencies on Linux using ocicl
  # ========================================
  fetch-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ocicl (Linux)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl
          gh release download --repo ocicl/ocicl --pattern '*_amd64.deb' --dir /tmp
          sudo dpkg -i /tmp/ocicl_*_amd64.deb
          ocicl setup > ~/.sbclrc

      - name: Fetch Lisp dependencies
        run: ocicl install

      - name: Generate SBOM
        run: |
          ocicl create-sbom cyclonedx rlgl-sbom.json
          ocicl create-sbom spdx rlgl-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: |
            rlgl-sbom.json
            rlgl-sbom.spdx.json
          retention-days: 1

      - name: Upload ocicl directory
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ocicl-deps
          path: ocicl
          retention-days: 1

  # ========================================
  # Build Linux packages (RPM and DEB)
  # ========================================
  build-rpm:
    needs: [fetch-deps, extract-version]
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download ocicl dependencies
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ocicl-deps
          path: ocicl

      - name: Download SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom
          path: .

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build rpmdevtools rpm-sign sbcl gcc make git

      - name: Setup rpmbuild directory
        run: rpmdev-setuptree

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Create source tarball
        run: |
          cd ..
          tar czf ~/rpmbuild/SOURCES/rlgl-${VERSION}.tar.gz --transform "s,^red-light-green-light,rlgl-${VERSION}," red-light-green-light

      - name: Update spec file version
        run: |
          sed -i "s/^Version:.*/Version:        ${VERSION}/" releng/rlgl.spec
          cp releng/rlgl.spec ~/rpmbuild/SPECS/
          cp rlgl-sbom.spdx.json ~/rpmbuild/SOURCES/ 2>/dev/null || true

      - name: Build RPM and SRPM
        run: |
          cd ~/rpmbuild/SPECS
          rpmbuild -ba rlgl.spec

      - name: Verify version is not dirty
        run: |
          RLGL_BIN=$(find ~/rpmbuild/BUILD -name rlgl -type f -executable | head -1)
          VERSION=$("$RLGL_BIN" --version 2>&1 || true)
          echo "rlgl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Sign RPMs
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.RPM_GPG_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "${RPM_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          GPG_NAME=$(gpg --list-secret-keys --with-colons | awk -F: '/^uid/{print $10; exit}')
          echo "Signing as: ${GPG_NAME}"
          echo "%_signature gpg" > ~/.rpmmacros
          echo "%_gpg_name ${GPG_NAME}" >> ~/.rpmmacros
          rpmsign --addsign ~/rpmbuild/RPMS/x86_64/*.rpm
          rpmsign --addsign ~/rpmbuild/SRPMS/*.src.rpm || true
          gpg --export --armor "${GPG_NAME}" | rpm --import -
          rpm --checksig ~/rpmbuild/RPMS/x86_64/*.rpm

      - name: Copy RPM and SRPM to workspace
        run: |
          cp ~/rpmbuild/RPMS/x86_64/*.rpm ${GITHUB_WORKSPACE}/ || true
          cp ~/rpmbuild/SRPMS/*.src.rpm ${GITHUB_WORKSPACE}/ || true

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-packages
          path: ./*.rpm

  build-deb:
    needs: [fetch-deps, extract-version]
    runs-on: ubuntu-latest
    container:
      image: debian:stable
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download ocicl dependencies
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ocicl-deps
          path: ocicl

      - name: Download SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom
          path: .

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y debhelper devscripts sbcl gcc make git gpg debsigs

      - name: Update changelog version
        run: |
          sed -i "s/^rlgl (.*)/rlgl (${VERSION}-1) unstable; urgency=medium/" releng/debian/changelog

      - name: Build DEB packages (binary and source)
        run: |
          ln -s releng/debian debian
          dpkg-buildpackage -uc -us

      - name: Verify version is not dirty
        run: |
          VERSION=$(./rlgl --version 2>&1 || true)
          echo "rlgl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Sign DEB packages
        env:
          DEB_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.DEB_GPG_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "${DEB_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          GPG_KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/{print $10; exit}')
          for deb in ../*.deb; do
            debsigs --sign=origin -k "${GPG_KEYID}" "${deb}"
          done

      - name: Copy DEB and source files to workspace
        run: |
          cp ../*.deb . 2>/dev/null || true
          cp ../*.dsc . 2>/dev/null || true
          cp ../*.tar.* . 2>/dev/null || true
          cp ../*.buildinfo . 2>/dev/null || true
          cp ../*.changes . 2>/dev/null || true

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-packages
          path: |
            ./*.deb
            ./*.dsc
            ./*.tar.*
            ./*.buildinfo
            ./*.changes

  # ========================================
  # Build Linux tarball
  # ========================================
  build-linux-tarball:
    needs: [fetch-deps, extract-version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download ocicl dependencies
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ocicl-deps
          path: ocicl

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl gcc make

      - name: Build
        run: make rlgl

      - name: Verify version is not dirty
        run: |
          VERSION=$(./rlgl --version 2>&1 || true)
          echo "rlgl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Package Linux binary
        run: |
          mkdir -p dist
          cp rlgl README.md COPYING dist/
          cp -r recog.d dist/
          cd dist && tar czf ../rlgl-${VERSION}-linux-amd64.tar.gz *

      - name: Upload Linux tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-tarball
          path: ./*.tar.gz

  # ========================================
  # Build macOS executables
  # ========================================
  build-macos-arm64:
    needs: [fetch-deps, extract-version]
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download ocicl dependencies
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ocicl-deps
          path: ocicl

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install dependencies
        run: brew install sbcl

      - name: Build
        run: make rlgl

      - name: Verify version is not dirty
        run: |
          VERSION=$(./rlgl --version 2>&1 || true)
          echo "rlgl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Package macOS binary
        run: |
          mkdir -p dist
          cp rlgl README.md COPYING dist/
          cp -r recog.d dist/
          cd dist && tar czf ../rlgl-${VERSION}-darwin-arm64.tar.gz *

      - name: Upload macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: darwin-arm64-package
          path: ./*.tar.gz

  build-macos-amd64:
    needs: [fetch-deps, extract-version]
    runs-on: macos-13
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download ocicl dependencies
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ocicl-deps
          path: ocicl

      - name: Remove .git to prevent dirty version detection
        run: rm -rf .git

      - name: Install dependencies
        run: brew install sbcl

      - name: Build
        run: make rlgl

      - name: Verify version is not dirty
        run: |
          VERSION=$(./rlgl --version 2>&1 || true)
          echo "rlgl version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "::error::Version string contains 'dirty': $VERSION"
            exit 1
          fi

      - name: Package macOS binary
        run: |
          mkdir -p dist
          cp rlgl README.md COPYING dist/
          cp -r recog.d dist/
          cd dist && tar czf ../rlgl-${VERSION}-darwin-amd64.tar.gz *

      - name: Upload macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: darwin-amd64-package
          path: ./*.tar.gz

  # ========================================
  # Sign release tarballs with Cosign
  # ========================================
  sign-artifacts:
    needs: [build-linux-tarball, build-macos-arm64, build-macos-amd64, extract-version]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Download Linux tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: linux-tarball
          path: ./artifacts

      - name: Download macOS ARM64 tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: darwin-arm64-package
          path: ./artifacts

      - name: Download macOS AMD64 tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: darwin-amd64-package
          path: ./artifacts

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign tarballs with Cosign
        run: |
          cd artifacts
          for f in *.tar.gz; do
            cosign sign-blob --yes --bundle "${f}.bundle" "$f"
          done

      - name: Upload signed artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cosign-bundles
          path: artifacts/*.bundle

  # ========================================
  # Generate SLSA Level 3 provenance
  # ========================================
  generate-provenance-subjects:
    needs: [build-rpm, build-deb, build-linux-tarball, build-macos-arm64, build-macos-amd64, extract-version]
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Generate hashes for SLSA provenance
        id: hash
        run: |
          cd artifacts
          find . -type f \( -name '*.rpm' -o -name '*.deb' -o -name '*.tar.gz' \) -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > checksums.txt
          cat checksums.txt
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> "$GITHUB_OUTPUT"

  slsa-provenance:
    needs: [generate-provenance-subjects]
    permissions:
      actions: read
      id-token: write
      contents: write
    # NOTE: SLSA generator requires a tag ref, not a commit SHA.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.generate-provenance-subjects.outputs.hashes }}"
      upload-assets: true
      provenance-name: provenance.intoto.jsonl

  # ========================================
  # Create GitHub Release
  # ========================================
  release:
    needs: [build-rpm, build-deb, build-linux-tarball, build-macos-arm64, build-macos-amd64, sign-artifacts, slsa-provenance, extract-version]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Generate unified checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.rpm' -o -name '*.deb' -o -name '*.tar.gz' -o -name '*.json' \) -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > ../checksums.sha256
          cat ../checksums.sha256

      - name: Create GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generateReleaseNotes: true
          artifacts: |
            artifacts/rpm-packages/*.rpm
            artifacts/deb-packages/*.deb
            artifacts/deb-packages/*.dsc
            artifacts/deb-packages/*.tar.*
            artifacts/deb-packages/*.buildinfo
            artifacts/deb-packages/*.changes
            artifacts/linux-tarball/*.tar.gz
            artifacts/darwin-arm64-package/*.tar.gz
            artifacts/darwin-amd64-package/*.tar.gz
            artifacts/cosign-bundles/*.bundle
            artifacts/sbom/rlgl-sbom.json
            checksums.sha256
          allowUpdates: true

  # ========================================
  # Build RPM repository metadata
  # ========================================
  build-rpm-repo:
    needs: [release, extract-version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
      TAG: v${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install createrepo_c
        run: sudo apt-get update && sudo apt-get install -y createrepo-c

      - name: Download RPM assets from release
        run: |
          mkdir -p /tmp/rpms
          gh release download "${TAG}" --pattern '*.rpm' --dir /tmp/rpms --skip-existing
          echo "Downloaded RPMs:"
          ls -lh /tmp/rpms/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build repodata
        run: createrepo_c /tmp/rpms

      - name: Rewrite package locations to release asset URLs
        run: |
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          cd /tmp/rpms/repodata

          gunzip -f *-primary.xml.gz
          PRIMARY=$(ls *-primary.xml)
          sed -i "s|<location href=\"\([^\"]*\.rpm\)\"|<location href=\"${BASE}/\1\"|g" "${PRIMARY}"
          gzip -9 "${PRIMARY}"

          cd /tmp/rpms
          REPODATA=repodata

          cat > "${REPODATA}/repomd.xml" <<'XMLHEADER'
          <?xml version="1.0" encoding="UTF-8"?>
          <repomd xmlns="http://linux.duke.edu/metadata/repo">
          XMLHEADER

          for gz in "${REPODATA}"/*.xml.gz; do
            fname="$(basename "${gz}")"
            type="$(echo "${fname}" | sed 's/.*-\([a-z_]*\)\.xml\.gz/\1/')"
            checksum="$(sha256sum "${gz}" | awk '{print $1}')"
            size="$(stat -c%s "${gz}")"
            open_file="${gz%.gz}"
            gunzip -k -f "${gz}"
            open_checksum="$(sha256sum "${open_file}" | awk '{print $1}')"
            open_size="$(stat -c%s "${open_file}")"
            rm -f "${open_file}"
            cat >> "${REPODATA}/repomd.xml" <<XMLDATA
            <data type="${type}">
              <checksum type="sha256">${checksum}</checksum>
              <open-checksum type="sha256">${open_checksum}</open-checksum>
              <location href="repodata/${fname}"/>
              <size>${size}</size>
              <open-size>${open_size}</open-size>
            </data>
          XMLDATA
          done

          echo "</repomd>" >> "${REPODATA}/repomd.xml"
          sed -i 's/^          //' "${REPODATA}/repomd.xml"

      - name: Sign repomd.xml and export public key
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.RPM_GPG_PRIVATE_KEY != '' }}
        run: |
          echo "${RPM_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          gpg --batch --detach-sign --armor /tmp/rpms/repodata/repomd.xml
          gpg --batch --export --armor > /tmp/rpms/RPM-GPG-KEY-rlgl

      - name: Upload RPM repo artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-repo
          path: /tmp/rpms/repodata/
          include-hidden-files: false

      - name: Upload RPM GPG key
        if: ${{ hashFiles('/tmp/rpms/RPM-GPG-KEY-rlgl') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-repo-key
          path: /tmp/rpms/RPM-GPG-KEY-rlgl

  # ========================================
  # Build DEB repository metadata
  # ========================================
  build-deb-repo:
    needs: [release, extract-version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
      TAG: v${{ needs.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install APT repo tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev gpg

      - name: Download DEB assets from release
        run: |
          mkdir -p /tmp/debs
          gh release download "${TAG}" --pattern '*.deb' --dir /tmp/debs --skip-existing
          echo "Downloaded DEBs:"
          ls -lh /tmp/debs/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        env:
          DEB_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.DEB_GPG_PRIVATE_KEY != '' }}
        run: |
          echo "${DEB_GPG_PRIVATE_KEY}" | base64 -d | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/{print $10; exit}')
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "$GITHUB_ENV"
          gpg --batch --export --armor > /tmp/debs/rlgl-archive-keyring.gpg

      - name: Build APT repository
        run: |
          REPO_DIR=/tmp/apt-repo
          mkdir -p "${REPO_DIR}/pool/main"
          mkdir -p "${REPO_DIR}/dists/stable/main/binary-amd64"
          cp /tmp/debs/*.deb "${REPO_DIR}/pool/main/"

          cd "${REPO_DIR}/pool/main"
          for pkg in $(ls *.deb | sed 's/_[0-9].*//' | sort -u); do
            ls -t ${pkg}_*.deb | tail -n +2 | xargs rm -f 2>/dev/null || true
          done
          cd "${REPO_DIR}"

          dpkg-scanpackages pool/main > dists/stable/main/binary-amd64/Packages
          gzip -9c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz

          cd dists/stable
          cat > Release <<EOF
          Origin: rlgl
          Label: rlgl
          Suite: stable
          Codename: stable
          Date: $(date -Ru)
          Architectures: amd64
          Components: main
          Description: Red Light Green Light APT repository
          EOF
          sed -i 's/^          //' Release

          {
            echo "MD5Sum:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz; do
              SIZE=$(stat -c%s "$f")
              MD5=$(md5sum "$f" | awk '{print $1}')
              printf " %s %16d %s\n" "$MD5" "$SIZE" "$f"
            done
            echo "SHA256:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz; do
              SIZE=$(stat -c%s "$f")
              SHA=$(sha256sum "$f" | awk '{print $1}')
              printf " %s %16d %s\n" "$SHA" "$SIZE" "$f"
            done
          } >> Release

      - name: Sign Release file
        env:
          DEB_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        if: ${{ env.DEB_GPG_PRIVATE_KEY != '' }}
        run: |
          cd /tmp/apt-repo/dists/stable
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clearsign -o InRelease Release

      - name: Copy keyring into repo
        run: |
          if [ -f /tmp/debs/rlgl-archive-keyring.gpg ]; then
            cp /tmp/debs/rlgl-archive-keyring.gpg /tmp/apt-repo/
          fi

      - name: Upload DEB repo artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-repo
          path: /tmp/apt-repo/

  # ========================================
  # Deploy package repos to GitHub Pages
  # ========================================
  deploy-pages:
    needs: [build-rpm-repo, build-deb-repo, extract-version]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download RPM repo artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rpm-repo
          path: docs/rpm-repo/repodata

      - name: Download RPM GPG key
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rpm-repo-key
          path: docs/rpm-repo
        continue-on-error: true

      - name: Download DEB repo artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: deb-repo
          path: docs/deb-repo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
